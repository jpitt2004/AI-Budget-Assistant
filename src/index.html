<!DOCTYPE html>
<html>
<head>
    <title>AI Budget Assistant</title>
</head>
<body>
    <h1>AI Budget Assistant for Students</h1>

    <h2>Sample Expenses</h2>
    <ul id="expenses"></ul>

    <h2>Spending Prediction</h2>
    <p id="prediction"></p>

    <script>
        fetch('http://127.0.0.1:5000/expenses')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('expenses');
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = `${item.date} - ${item.category}: $${item.amount}`;
                    list.appendChild(li);
                });
            });

        fetch('http://127.0.0.1:5000/prediction')
            .then(response => response.json())
            .then(data => {
                document.getElementById('prediction').textContent =
                    `Average Daily Spending: $${data.average_daily_spending} | ${data.alert}`;
            });
    </script>
</body>
</html>
